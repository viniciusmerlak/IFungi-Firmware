; ==============================================================================
; PlatformIO Project Configuration File — IFungi Greenhouse System
; ==============================================================================
;
; Documentação: https://docs.platformio.org/page/projectconf.html
;
; HISTÓRICO DE ALTERAÇÕES:
;   v1.0 → Configuração original
;   v1.1 → Suporte a OTA (partição min_spiffs, build_flags HTTPS)
;   v1.2 → Segurança: credenciais movidas para .env via scripts/load_env.py
;           - NUNCA commite o .env
;           - Commite o .env.example (sem valores reais)
; ==============================================================================

[env:esp32doit-devkit-v1]
platform  = espressif32
board     = esp32doit-devkit-v1
framework = arduino

; ------------------------------------------------------------------------------
; SCRIPT DE SEGREDOS — lê .env e injeta como -D antes de compilar
; ------------------------------------------------------------------------------
extra_scripts = pre:scripts/load_env.py

; ------------------------------------------------------------------------------
; MONITOR SERIAL
; ------------------------------------------------------------------------------
monitor_speed   = 115200
monitor_filters = esp32_exception_decoder, colorize

; ------------------------------------------------------------------------------
; PARTICIONAMENTO OTA
; ------------------------------------------------------------------------------
board_build.partitions = min_spiffs.csv

; ------------------------------------------------------------------------------
; DEPENDÊNCIAS
; ------------------------------------------------------------------------------
lib_deps =
    mobizt/Firebase ESP32 Client@^4.4.17
    bblanchon/ArduinoJson@^7.4.2
    adafruit/DHT sensor library@^1.4.6
    adafruit/Adafruit CCS811 Library@^1.1.3
    adafruit/Adafruit BusIO@^1.17.2
    adafruit/Adafruit Unified Sensor@^1.1.15
    tzapu/WiFiManager@^2.0.17
    arduino-libraries/NTPClient@^3.2.1
    madhephaestus/ESP32Servo@^3.0.9
    ricmoo/QRCode@^0.0.1

; ------------------------------------------------------------------------------
; BUILD FLAGS
; ------------------------------------------------------------------------------
build_flags =
    -Wno-unused-variable
    -Wno-unused-function
    ; ── SSL buffers ────────────────────────────────────────────────────────────
    ; CORREÇÃO CRÍTICA v1.2.3:
    ; O erro "Incoming record is too large" ocorria porque 4096 bytes não
    ; comporta um registro TLS completo do Firebase (certificados RSA 2048-bit
    ; + payload JSON podem ultrapassar 5 KB num único record).
    ; 16384 é o tamanho máximo de um record TLS 1.2 (RFC 5246 §6.2.1) e
    ; garante que qualquer resposta do Firebase caiba no buffer de entrada.
    ; O buffer de saída (OUT) pode ser menor pois requests do ESP32 são curtos.
    -DCONFIG_MBEDTLS_SSL_IN_CONTENT_LEN=16384
    -DCONFIG_MBEDTLS_SSL_OUT_CONTENT_LEN=4096
    ; ── Stack da loopTask ──────────────────────────────────────────────────────
    ; CORREÇÃO CRÍTICA v1.2.3:
    ; "Stack canary watchpoint triggered (loopTask)" — o handshake TLS/RSA
    ; do BearSSL (br_rsa_i31_public) aloca ~6-7 KB de stack frame sozinho.
    ; Com o stack padrão de 8 KB, qualquer chamada Firebase dentro do setup()
    ; (verifyGreenhouse → createInitialGreenhouse → getJSON → SSL handshake)
    ; estoura o stack e causa o panic.
    ; SET_LOOP_TASK_STACK_SIZE define o stack da loopTask (onde setup/loop rodam)
    ; ANTES de ela ser criada pelo framework Arduino ESP32.
    ; 24576 = 24 KB: suficiente para o handshake TLS + JSON parsing + call stack
    ; do setup() sem desperdiçar RAM heap desnecessariamente.
    -DARDUINO_LOOP_STACK_SIZE=24576
    -DHTTPCLIENT_1_1_COMPATIBLE=1
    -DCONFIG_OTA_ALLOW_HTTP=1
    ; As variáveis do .env são injetadas pelo scripts/load_env.py — não declare aqui.

; ------------------------------------------------------------------------------
; FILTRO DE FONTES
; ------------------------------------------------------------------------------
build_src_filter = +<MainController.cpp> +<*.cpp> +<*.h>
upload_speed     = 921600

; ------------------------------------------------------------------------------
; [OPCIONAL] Upload OTA local — senha vem do .env via variável de ambiente
; ------------------------------------------------------------------------------
; [env:esp32-ota-local]
; extends         = env:esp32doit-devkit-v1
; upload_protocol = espota
; upload_port     = 192.168.1.XXX
; upload_flags    =
;     --port=3232
;     --auth=${sysenv.IFUNGI_OTA_PASSWORD}