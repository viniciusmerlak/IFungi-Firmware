; ==============================================================================
; PlatformIO Project Configuration File — IFungi Greenhouse System
; ==============================================================================
;
; Documentação: https://docs.platformio.org/page/projectconf.html
;
; HISTÓRICO DE ALTERAÇÕES:
;   v1.0 → Configuração original
;   v1.1 → Suporte a OTA adicionado:
;           - board_build.partitions já estava correto (min_spiffs.csv) ✅
;           - Adicionados build_flags para HTTPS confiável e OTA
;           - Adicionado monitor_filters para legibilidade do Serial
;           - Adicionado upload_speed otimizado
;           - AsyncTCP e ANSI comentados (não encontrados no código)
; ==============================================================================

[env:esp32doit-devkit-v1]
platform  = espressif32
board     = esp32doit-devkit-v1
framework = arduino

; ------------------------------------------------------------------------------
; MONITOR SERIAL
; ------------------------------------------------------------------------------
monitor_speed   = 115200
; colorize  → destaca linhas com ✅ ❌ [OTA] [SENSOR] etc.
; esp32_exception_decoder → traduz stack traces de crash em nomes de função
monitor_filters = esp32_exception_decoder, colorize

; ------------------------------------------------------------------------------
; PARTICIONAMENTO — CRÍTICO PARA OTA
; ------------------------------------------------------------------------------
; min_spiffs.csv distribui os 4MB da flash assim:
;   nvs      →   20 KB  (credenciais WiFi, Firebase, setpoints — NVS/Preferences)
;   otadata  →    8 KB  (registra qual slot está ativo: app0 ou app1)
;   app0     → 1920 KB  (firmware em execução)
;   app1     → 1920 KB  (slot OTA — novo firmware é gravado aqui)
;   spiffs   →  192 KB  (arquivos, não usado ativamente)
;
; Firmware estimado com todas as libs: ~955 KB → margem de ~965 KB por slot ✅
; JÁ ESTAVA CORRETO — nenhuma alteração necessária nesta linha.
board_build.partitions = min_spiffs.csv

; ------------------------------------------------------------------------------
; DEPENDÊNCIAS
; ------------------------------------------------------------------------------
lib_deps =
    ; --- Firebase e serialização ---
    mobizt/Firebase ESP32 Client@^4.4.17
    bblanchon/ArduinoJson@^7.4.2

    ; --- Sensores ---
    adafruit/DHT sensor library@^1.4.6
    adafruit/Adafruit CCS811 Library@^1.1.3
    adafruit/Adafruit BusIO@^1.17.2
    adafruit/Adafruit Unified Sensor@^1.1.15

    ; --- Interface e conectividade ---
    tzapu/WiFiManager@^2.0.17
    arduino-libraries/NTPClient@^3.2.1
    madhephaestus/ESP32Servo@^3.0.9
    ricmoo/QRCode@^0.0.1

    ; REMOVIDO: esp32async/AsyncTCP — não encontrado uso nos arquivos do projeto.
    ; Se algum arquivo não analisado usar AsyncWebServer, descomente abaixo:
    ; esp32async/AsyncTCP@^3.4.7

    ; REMOVIDO: robtillaart/ANSI — não encontrado uso nos arquivos do projeto.
    ; Se usar Serial com escape codes ANSI, descomente abaixo:
    ; robtillaart/ANSI@^0.3.4

    ; NOTA OTA: Update.h, HTTPClient.h e WiFiClientSecure.h são parte do
    ; ESP32 Arduino Core — não precisam ser declaradas aqui. ✅

; ------------------------------------------------------------------------------
; BUILD FLAGS
; ------------------------------------------------------------------------------
build_flags =
    -Wno-unused-variable
    -Wno-unused-function

    ; --- OTA / HTTPS: buffer SSL adequado para download de firmware ---
    ; O padrão de 512B causa falhas em chunks do stream TLS durante o OTA.
    ; 4096B = tamanho de um registro TLS completo, valor recomendado.
    -DCONFIG_MBEDTLS_SSL_IN_CONTENT_LEN=4096
    -DCONFIG_MBEDTLS_SSL_OUT_CONTENT_LEN=4096

    ; --- OTA: permite que HTTPClient siga redirecionamentos HTTP 302 ---
    ; Firebase Storage retorna 302 → URL assinada antes de servir o .bin.
    ; Sem esta flag o download falha silenciosamente no redirect.
    -DHTTPCLIENT_1_1_COMPATIBLE=1

    ; --- OTA: permite transporte HTTP além de HTTPS (necessário internamente) ---
    -DCONFIG_OTA_ALLOW_HTTP=1

; ------------------------------------------------------------------------------
; UPLOAD SERIAL (primeiro flash ou recuperação)
; ------------------------------------------------------------------------------
build_src_filter = +<MainController.cpp> +<*.cpp> +<*.h>
upload_speed = 921600

; ------------------------------------------------------------------------------
; [OPCIONAL] Perfil para upload OTA local via espota.py (bancada de dev)
; ------------------------------------------------------------------------------
; Descomente e ajuste o IP do ESP32 na sua rede local para usar:
;   pio run -e esp32-ota-local --target upload
;
; [env:esp32-ota-local]
; extends         = env:esp32doit-devkit-v1
; upload_protocol = espota
; upload_port     = 192.168.1.XXX
; upload_flags    =
;     --port=3232
;     --auth=ifungi_ota
